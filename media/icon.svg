<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">

<!-- Background card -->
<rect x="215" y="30" width="250" height="340" rx="24" fill="#13141f" style="fill:rgb(19, 20, 31);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Icon square -->
<rect x="255" y="55" width="170" height="170" rx="32" fill="#6c63ff" style="fill:rgb(108, 99, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Lightning bolt — centered in square -->
<path d="M350 85 L334 128 L350 128 L338 195 L368 142 L350 142 L366 85 Z" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Ping dot — top right of icon -->
<circle cx="404" cy="72" r="14" fill="#13141f" style="fill:rgb(19, 20, 31);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<circle cx="404" cy="72" r="10" fill="#00d4aa" style="fill:rgb(0, 212, 170);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<circle cx="404" cy="72" r="5" fill="#13141f" style="fill:rgb(19, 20, 31);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Wordmark -->
<text x="340" y="268" font-family="'Segoe UI', system-ui, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, system-ui, sans-serif;font-size:36px;font-weight:700;text-anchor:middle;dominant-baseline:auto">Ping<tspan fill="#6c63ff" style="fill:rgb(108, 99, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, system-ui, sans-serif;font-size:36px;font-weight:700;text-anchor:middle;dominant-baseline:auto">2</tspan>Bro</text>

<!-- Tagline -->
<text x="340" y="298" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="400" fill="#00d4aa" text-anchor="middle" letter-spacing="3" style="fill:rgb(0, 212, 170);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Segoe UI&quot;, system-ui, sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">CODE TOGETHER</text>

</svg>